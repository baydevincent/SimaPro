services:
  # Nginx Web Server
  nginx:
    image: nginx:alpine
    container_name: simapro-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
      - postgresql
    networks:
      - simapro-network

  # PHP-FPM Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: simapro-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - simapro-storage:/var/www/html/storage
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - DB_CONNECTION=pgsql
      - DB_HOST=postgresql
      - DB_PORT=5432
      - DB_DATABASE=simapro
      - DB_USERNAME=simapro
      - DB_PASSWORD=simapro_secret
    depends_on:
      - postgresql
    networks:
      - simapro-network

  # PostgreSQL Database
  postgresql:
    image: postgres:16-alpine
    container_name: simapro-postgresql
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: simapro
      POSTGRES_USER: simapro
      POSTGRES_PASSWORD: simapro_secret
    volumes:
      - postgresql-data:/var/lib/postgresql/data
    networks:
      - simapro-network

  # Redis Cache (Optional)
  redis:
    image: redis:alpine
    container_name: simapro-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - simapro-network

  # Node.js for Asset Compilation
  node:
    image: node:20-alpine
    container_name: simapro-node
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    entrypoint: ["tail", "-f", "/dev/null"]
    networks:
      - simapro-network

volumes:
  postgresql-data:
    driver: local
  redis-data:
    driver: local
  simapro-storage:
    driver: local

networks:
  simapro-network:
    driver: bridge
